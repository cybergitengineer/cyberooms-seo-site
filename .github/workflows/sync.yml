name: Sync Notion to Website

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:       # allows manual run from Actions tab

jobs:
  update-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Pull Notion content
        run: python scripts/sync_notion.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
      - name: Commit updates
        run: |
          git config --global user.name "Cyberooms AutoSync"
          git config --global user.email "sync@cyberooms.com"
          git add .
          git commit -m "Auto-update from Notion" || echo "No changes"
          git push
